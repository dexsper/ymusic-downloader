name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ymusic-downloader

    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ymusic-downloader/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ymusic-downloader/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} `
            --title "${{ github.ref_name }}" `
            --generate-notes `
            "target/release/ymusic-downloader.exe#Yandex Music Downloader.exe"
